<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cipher Techniques</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      background: #ffffff;
      width: 90%;
      max-width: 850px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      color: #2d2d2d;
      margin-bottom: 25px;
      font-size: 42px;
    }

    textarea {
      width: 100%;
      height: 160px;
      padding: 18px;
      font-size: 28px;
      border: 2px solid #dcdcdc;
      border-radius: 14px;
      outline: none;
      resize: none;
      margin-bottom: 25px;
      transition: 0.3s;
    }

    textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.25);
    }

    button {
      background: linear-gradient(135deg, #ff6a00, #ee0979);
      color: white;
      border: none;
      padding: 15px 35px;
      font-size: 24px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s ease;
      margin-bottom: 30px;
      box-shadow: 0 8px 20px rgba(238, 9, 121, 0.25);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(238, 9, 121, 0.35);
    }

    h2 {
      margin: 20px 0 10px;
      color: #222;
      font-size: 26px;
    }

    h3 {
      margin-top: 25px;
      color: #444;
      font-size: 22px;
    }

    .output-box {
      padding: 20px;
      margin-top: 12px;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 500;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
    }

    .substitution {
      background: linear-gradient(135deg, #d4fc79, #96e6a1);
      color: #1f3d1f;
    }

    .transposition {
      background: linear-gradient(135deg, #84fab0, #8fd3f4);
      color: #123b52;
    }

    .demo-box {
      background: #f7f7ff;
      color: #555;
      border-left: 6px solid #764ba2;
      text-align: left;
      justify-content: flex-start;
      padding-left: 18px;
    }

    .section {
      margin-top: 25px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 32px;
      }

      textarea {
        font-size: 20px;
        height: 130px;
      }

      button {
        font-size: 20px;
        padding: 12px 25px;
      }

      .output-box {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cipher Techniques</h1>

    <textarea id="message" placeholder="Enter message">I love cyber security</textarea>
    <br />
    <button onclick="encrypt()">Encrypt</button>

    <div class="section">
      <h2>Substitution Cipher</h2>
      <div id="sub" class="output-box substitution"></div>
    </div>

    <div class="section">
      <h2>Encryption Demo</h2>
      <div class="output-box demo-box">
        Caesar Cipher shifts each letter by 3 positions. Transposition Cipher reverses the text.
      </div>
    </div>

    <div class="section">
      <h2>Transposition Cipher</h2>
      <div id="trans" class="output-box transposition"></div>
    </div>
  </div>

  <script>
    function encrypt() {
      let msg = document.getElementById("message").value;
      let sub = "";

      for (let i = 0; i < msg.length; i++) {
        let ch = msg[i];

        if (ch >= 'A' && ch <= 'Z') {
          sub += String.fromCharCode((ch.charCodeAt(0) - 65 + 3) % 26 + 65);
        } else if (ch >= 'a' && ch <= 'z') {
          sub += String.fromCharCode((ch.charCodeAt(0) - 97 + 3) % 26 + 97);
        } else {
          sub += ch;
        }
      }

      let trans = msg.split("").reverse().join("");

      document.getElementById("sub").innerText = sub;
      document.getElementById("trans").innerText = trans;
    }

    encrypt();
  </script>
</body>
</html>
